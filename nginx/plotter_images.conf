# Nginx configuration to serve Plotter-generated PNG images and HTML gallery.
# Adjust the path below to point to your application folder.

server {
    listen 80;
    server_name _;

    location / {
        alias /opt/solarcontrol/app/www/;
        autoindex on;
        access_log /var/log/nginx/solarcontrol_plots_access.log;
        error_log /var/log/nginx/solarcontrol_plots_error.log;
    }
}
